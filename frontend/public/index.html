<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Meetify — Fast, secure, and beautiful video conferencing." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Meetify</title>
    <!--
      Inject backend URL at build time via CRA template substitution.
      This ensures the correct API URL is always available at runtime,
      even on Render where the static site is pre-built before deployment.
    -->
    <script>
      (function() {
        var raw = "%REACT_APP_BACKEND_URL%";
        // If CRA replaced the template AND it's a real URL, expose it globally.
        var url = (raw && !raw.startsWith("%") && raw !== "undefined" && raw !== "null") ? raw : "";
        window.__BACKEND_URL__ = url;

        // Debug logging in development
        if (window.location.hostname.includes('localhost') || window.location.hostname.includes('127.0.0.1')) {
          console.log('[Runtime] Backend URL configured:', url || '(not set, will use localhost)');
        }

        // Check if we're on HTTPS and warn about mixed content
        if (url && url.startsWith('http:') && window.location.protocol === 'https:') {
          console.error('[Runtime] WARNING: Backend URL is HTTP but page is HTTPS. This will cause mixed content errors.');
          console.error('[Runtime] Please use HTTPS for your backend or update REACT_APP_BACKEND_URL');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
