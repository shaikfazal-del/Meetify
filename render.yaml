services:
  # ── Backend: Node.js Web Service ─────────────────────────────────────────
  - type: web
    name: meetify-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        value: https://meetify-frontend.onrender.com

  # ── Frontend: Static Site ─────────────────────────────────────────────────
  - type: web
    name: meetify-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://meetify-iv9d.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
