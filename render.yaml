services:
  # ── Backend: Node.js Web Service ─────────────────────────────────────────
  - type: web
    name: meetify-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        fromService:
          name: meetify-frontend
          type: static
          property: url

  # ── Frontend: Static Site ─────────────────────────────────────────────────
  - type: static
    name: meetify-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: meetify-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
